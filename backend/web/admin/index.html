<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex+++ 管理后台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d8dde6;
      --text: #1e2430;
      --muted: #667085;
      --brand: #116b5f;
      --brand-soft: #e6f4f1;
      --danger: #b42318;
      --ok: #087443;
      --warn: #9f5f00;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    header { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: var(--panel); border-bottom: 1px solid var(--line); }
    h1 { font-size: 18px; margin: 0; font-weight: 650; }
    main { display: grid; grid-template-columns: 220px minmax(0, 1fr); min-height: calc(100vh - 56px); }
    nav { padding: 16px; border-right: 1px solid var(--line); background: #fbfcfd; }
    nav button { width: 100%; height: 36px; margin-bottom: 8px; border: 1px solid transparent; background: transparent; color: var(--text); text-align: left; padding: 0 12px; border-radius: 6px; cursor: pointer; }
    nav button.active { background: var(--brand-soft); border-color: #b7ddd5; color: var(--brand); font-weight: 650; }
    section { padding: 22px 28px 40px; }
    .auth { max-width: 420px; margin: 12vh auto; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 24px; }
    .grid { display: grid; gap: 14px; }
    .cards { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .card, .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
    .metric { color: var(--muted); font-size: 13px; }
    .metric strong { display: block; color: var(--text); font-size: 28px; margin-top: 8px; }
    .toolbar { display: flex; gap: 10px; align-items: center; margin: 0 0 14px; flex-wrap: wrap; }
    .toolbar input, .toolbar select { width: 180px; }
    .pager { display: flex; gap: 8px; align-items: center; justify-content: flex-end; margin-top: 12px; color: var(--muted); font-size: 13px; }
    input, select, textarea { width: 100%; min-height: 36px; border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; background: #fff; color: var(--text); }
    textarea { min-height: 68px; resize: vertical; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    button { border: 1px solid var(--line); background: #fff; min-height: 36px; border-radius: 6px; padding: 0 12px; cursor: pointer; color: var(--text); }
    button.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    button.danger { color: var(--danger); border-color: #f0b8b2; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; line-height: 1.4; vertical-align: top; word-break: normal; overflow-wrap: anywhere; }
    th { color: var(--muted); background: #fbfcfd; font-weight: 600; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    .split { display: grid; grid-template-columns: 340px minmax(0, 1fr); gap: 16px; align-items: start; }
    .status { display: inline-flex; align-items: center; min-height: 24px; padding: 0 8px; border-radius: 999px; background: #eef2f6; color: var(--muted); }
    .status.active, .status.approved, .status.available, .status.fulfilled { background: #e7f7ee; color: var(--ok); }
    .status.pending, .status.contacted { background: #fff6e5; color: var(--warn); }
    .status.checking { background: #eaf2ff; color: #175cd3; }
    .status.disabled, .status.rejected { background: #fdeceb; color: var(--danger); }
    .msg { min-height: 22px; color: var(--muted); }
    .msg.err { color: var(--danger); }
    .hidden { display: none !important; }
    .row-actions { display: grid; grid-template-columns: 1fr; gap: 6px; align-items: stretch; white-space: normal; }
    .row-actions button { width: 100%; min-height: 28px; padding: 0 6px; background: #fbfcfd; }
    .api-key-table td:last-child { vertical-align: middle; }
    .switch-slot { display: inline-flex; width: 42px; min-width: 42px; height: 30px; align-items: center; justify-content: center; }
    .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .page-head h2 { margin: 0; font-size: 20px; }
    .table-wrap { width: 100%; overflow: hidden; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
    .table-wrap table { border: 0; border-radius: 0; min-width: 0; }
    .table-wrap .api-key-table { table-layout: fixed; width: 100%; min-width: 0; }
    .api-key-table th, .api-key-table td { padding: 10px 8px; }
    .time-cell { white-space: normal; }
    .account-main { display: grid; gap: 4px; min-width: 0; }
    .account-main strong { font-weight: 650; }
    .meta-stack { display: grid; gap: 4px; color: var(--muted); }
    .meta-stack strong { color: var(--text); font-weight: 600; }
    .meta-stack .status { justify-self: start; }
    .runtime-summary { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; background: #fbfcfd; }
    .meta-inline { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .muted { color: var(--muted); }
    .upstream-form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .upstream-form-grid label:last-of-type, .upstream-form-grid textarea { grid-column: 1 / -1; }
    .upstream-json { min-height: 120px; font-family: Consolas, "SFMono-Regular", monospace; font-size: 12px; }
    .upstream-panel-actions { display: flex; gap: 10px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .session-import { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; padding: 12px; border: 1px solid #b7ddd5; border-radius: 6px; background: var(--brand-soft); }
    .session-import div { display: grid; gap: 4px; }
    .session-import a { display: inline-flex; align-items: center; min-height: 36px; padding: 0 12px; border: 1px solid var(--brand); border-radius: 6px; color: var(--brand); background: #fff; text-decoration: none; font-weight: 600; }
    .panel-close { margin-left: auto; }
    .usage-priority-table { table-layout: fixed; }
    .usage-priority-table .account-main { gap: 3px; }
    .usage-value { display: grid; gap: 3px; }
    .usage-value strong { color: var(--text); font-size: 14px; }
    .idle-usage { cursor: help; }
    .remark-cell { display: block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .remark-editor textarea { min-height: 84px; }
    .account-detail { display: grid; gap: 8px; }
    .account-detail summary { cursor: pointer; color: var(--text); font-weight: 650; }
    .detail-grid { display: grid; grid-template-columns: 92px minmax(0, 1fr); gap: 6px 10px; margin-top: 8px; color: var(--muted); }
    .detail-grid span:nth-child(2n) { color: var(--text); }
    .switch-toggle { width: 38px; height: 20px; min-height: 20px; padding: 0; border-radius: 999px; border-color: #cfd6e2; background: #e8edf3; position: relative; vertical-align: middle; }
    .switch-toggle::before { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 999px; background: #8a95a5; box-shadow: 0 1px 2px rgba(16, 24, 40, .18); transition: left .16s ease, background .16s ease; }
    .switch-toggle.enabled { background: #d8efe7; border-color: #a8d8c9; }
    .switch-toggle.enabled::before { left: 18px; background: var(--ok); }
    .analytics-filter-grid { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 12px; align-items: end; }
    .analytics-account-field { grid-column: span 2; align-self: stretch; }
    .analytics-accounts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px 12px; max-height: 116px; overflow: auto; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; background: #fbfcfd; }
    .analytics-account-option { display: flex; align-items: center; gap: 7px; min-width: 0; color: var(--text); }
    .analytics-account-option input { width: auto; min-height: 0; margin: 0; }
    .analytics-account-option span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .analytics-actions { display: flex; gap: 8px; align-items: center; }
    .analytics-cards { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-top: 14px; }
    .analytics-chart { margin-top: 14px; overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 12px; }
    .analytics-chart svg { display: block; width: 100%; min-width: 720px; height: auto; }
    .analytics-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin: 4px 0 0 54px; color: var(--muted); font-size: 12px; }
    .analytics-legend span { display: inline-flex; align-items: center; gap: 6px; }
    .analytics-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 999px; }
    .analytics-note { margin: 10px 0 0; color: var(--muted); font-size: 12px; line-height: 1.6; }
    .analytics-note.warn { color: var(--warn); }
    .analytics-table-wrap { max-height: 420px; overflow: auto; margin-top: 14px; border: 1px solid var(--line); border-radius: 8px; }
    .analytics-table-wrap table { border: 0; border-radius: 0; }
    .analytics-table-wrap thead { position: sticky; top: 0; z-index: 1; }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      nav { display: flex; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--line); }
      nav button { min-width: 132px; }
      .cards, .split { grid-template-columns: 1fr; }
      .analytics-filter-grid, .analytics-cards { grid-template-columns: 1fr; }
      .analytics-account-field { grid-column: auto; }
      .analytics-accounts { grid-template-columns: 1fr; }
      .upstream-form-grid { grid-template-columns: 1fr; }
      section { padding: 18px; }
    }
  </style>
</head>
<body>
  <div id="auth" class="auth">
    <h1>Codex+++ 管理后台</h1>
    <p id="authHint" class="msg">正在检查初始化状态</p>
    <div class="grid">
      <label>管理员账号<input id="account" autocomplete="username"></label>
      <label>管理员密码<input id="password" type="password" autocomplete="current-password"></label>
      <label id="newPasswordWrap" class="hidden">新密码<input id="newPassword" type="password" autocomplete="new-password"></label>
      <button id="authAction" class="primary">继续</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <header>
      <h1>Codex+++ 管理后台</h1>
      <button id="logout">退出</button>
    </header>
    <main>
      <nav id="tabs">
        <button data-tab="overview" class="active">运营概览</button>
        <button data-tab="users">普通用户</button>
        <button data-tab="topups">Token 充值项</button>
        <button data-tab="orders">账号购买申请</button>
        <button data-tab="recharges">待确认充值</button>
        <button data-tab="upstreams">号池 Key</button>
        <button data-tab="devices">设备管理</button>
        <button data-tab="usage">用量与审计</button>
      </nav>
      <section id="content"></section>
    </main>
  </div>

  <script>
    const api = location.origin + '/api';
    const state = { token: localStorage.getItem('adminToken') || '', tab: 'overview', initialized: false, usersPage: 1, userQ: '', userDetailId: '', userLedgerPage: 1, userRechargePage: 1, userUsagePage: 1, topupsPage: 1, topupQ: '', topupEnabled: '', topupEditId: '', orderPage: 1, orderStatus: '', orderMsg: '', orderFulfillId: '', rechargePage: 1, upstreamPage: 1, upstreamAvailable: '', upstreamMsg: '', upstreamPanel: '', upstreamRemarkId: '', upstreamCheckingIds: [], codexOAuth: null, devicePage: 1, usagePage: 1, usageToday: '', ledgerPage: 1, auditPage: 1, usageAnalyticsAccounts: [], usageAnalyticsFrom: '', usageAnalyticsTo: '', usageAnalyticsGroupBy: 'day', usageAnalyticsMetric: 'averageTokensPerTask', usageAnalyticsTimezone: 'Asia/Shanghai', usageAnalyticsMinTasks: '', usageAnalyticsMaxTasks: '', usageAnalyticsMinTokens: '', usageAnalyticsMaxTokens: '' };
    let codexOAuthPollTimer = 0;
    let upstreamUsageRefreshTimer = 0;
    let upstreamRenderRevision = 0;
    const $ = (id) => document.getElementById(id);
    const fmtTime = (v) => v ? new Date(v).toLocaleString() : '';
    const fmtUsagePeriod = (from, to) => {
      if (!to) return '未记录';
      const start = fmtTime(from || to);
      const end = fmtTime(to);
      return start === end ? end : `${start} 至 ${end}`;
    };
    const money = (cents) => cents === 0 ? 'free' : '¥' + (Number(cents || 0) / 100).toFixed(2);
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (ch) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    })[ch]);
    const statusClass = (v) => String(v || '').toLowerCase().replace(/[^a-z0-9_-]/g, '');
    const statusLabel = (v) => ({
      active: '可用',
      available: '可用',
      disabled: '不可用',
      unavailable: '不可用',
      pending: '等待管理员确认',
      contacted: '已联系',
      fulfilled: '已发放',
      approved: '已确认',
      rejected: '已拒绝',
      cancelled: '已取消',
      pending_authorization: '待授权',
      authorizing: '授权准备中',
      action_required: '等待完成授权',
      authorized: '已授权',
      checking: '检查中',
      failed: '授权失败'
    })[v] || (v || '');
    const status = (v) => `<span class="status ${statusClass(v)}">${esc(statusLabel(v))}</span>`;
    const availability = (v) => {
      const ok = v === 'active' || v === 'available';
      return `<span class="status ${ok ? 'available' : 'disabled'}">${ok ? '可用' : '不可用'}</span>`;
    };
    const clientStateCell = (user) => {
      const states = [];
      if (user.clientOnline) states.push('<span class="status available">在线</span>');
      else states.push('<span class="muted">离线</span>');
      if (user.clientActive) states.push('<span class="status">Codex 运行中</span>');
      if (user.gatewayActive) states.push('<span class="status checking">号池使用中</span>');
      const upstream = user.assignedUpstreamAccount || {};
      const upstreamLabel = upstream.name || upstream.email || upstream.id || '';
      const lastSeen = user.clientOnlineLastSeenAt ? `最近心跳 ${fmtTime(user.clientOnlineLastSeenAt)}` : '';
      const detail = [upstreamLabel ? `使用 ${upstreamLabel}` : '', lastSeen].filter(Boolean).join(' · ');
      return `<div class="meta-stack">${states.join(' ')}${detail ? `<span class="muted">${esc(detail)}</span>` : ''}</div>`;
    };
    const qs = (params) => new URLSearchParams(Object.entries(params).filter(([, v]) => v !== undefined && v !== null && v !== '')).toString();

    async function request(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (state.token) headers.Authorization = `Bearer ${state.token}`;
      const res = await fetch(api + path, { ...opts, headers });
      const text = await res.text();
      const data = text ? JSON.parse(text) : {};
      if (!res.ok) throw new Error(data.error || res.statusText);
      return data;
    }

    async function downloadAdminJSON(path) {
      const res = await fetch(api + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${state.token}` },
        body: '{}'
      });
      if (!res.ok) {
        const text = await res.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch {}
        throw new Error(data.error || res.statusText);
      }
      const disposition = res.headers.get('Content-Disposition') || '';
      const match = disposition.match(/filename="?([^";]+)"?/i);
      const filename = match ? match[1] : 'codexppp-account-pool.json';
      const href = URL.createObjectURL(await res.blob());
      const link = document.createElement('a');
      link.href = href;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(href);
    }

    async function bootstrap() {
      try {
        const info = await request('/admin/bootstrap');
        state.initialized = info.initialized;
        $('authHint').textContent = info.initialized ? '请输入管理员账号和密码' : '初始化首个管理员';
        $('authAction').textContent = info.initialized ? '登录' : '初始化';
        if (state.token) await resumeAdminSession();
      } catch (err) {
        $('authHint').textContent = err.message;
        $('authHint').className = 'msg err';
      }
    }

    async function resumeAdminSession() {
      try {
        const data = await request('/admin/me');
        if (data.admin && data.admin.mustChangePassword) {
          $('authHint').textContent = '请完成首轮更改账户密码';
          $('newPasswordWrap').classList.remove('hidden');
          $('authAction').textContent = '保存新密码';
          return;
        }
        showApp();
      } catch (err) {
        localStorage.removeItem('adminToken');
        state.token = '';
      }
    }

    function requireFreshAdminLogin(message = '为保护号池授权数据，请重新登录后再导出') {
      localStorage.removeItem('adminToken');
      state.token = '';
      $('app').classList.add('hidden');
      $('auth').classList.remove('hidden');
      $('newPasswordWrap').classList.add('hidden');
      $('authAction').textContent = '登录';
      $('password').value = '';
      $('authHint').textContent = message;
      $('authHint').className = 'msg err';
      $('password').focus();
    }

    async function authAction() {
      const account = $('account').value;
      const password = $('password').value;
      const newPassword = $('newPassword').value;
      try {
        if (!$('newPasswordWrap').classList.contains('hidden')) {
          await request('/admin/password', { method: 'POST', body: JSON.stringify({ password: newPassword }) });
          $('newPasswordWrap').classList.add('hidden');
          showApp();
          return;
        }
        const path = state.initialized ? '/admin/login' : '/admin/setup';
        const data = await request(path, { method: 'POST', body: JSON.stringify({ account, password }) });
        state.token = data.token;
        localStorage.setItem('adminToken', state.token);
        if (data.admin && data.admin.mustChangePassword) {
          $('authHint').textContent = '请完成首轮更改账户密码';
          $('newPasswordWrap').classList.remove('hidden');
          $('authAction').textContent = '保存新密码';
          return;
        }
        showApp();
      } catch (err) {
        $('authHint').textContent = err.message === 'login_failed' ? '登录失败' : err.message;
        $('authHint').className = 'msg err';
      }
    }

    function showApp() {
      $('auth').classList.add('hidden');
      $('app').classList.remove('hidden');
      render();
    }

    function formData(form) {
      return Object.fromEntries(new FormData(form).entries());
    }

    function fmtNumber(v) {
      return new Intl.NumberFormat('zh-CN', { maximumFractionDigits: 2 }).format(Number(v || 0));
    }
    function fmtPercent(v) {
      return `${fmtNumber(v)}%`;
    }
    function usageMetricLabel(metric) {
      return ({
        averageTokensPerTask: '单任务平均 Token',
        taskCount: '任务量',
        totalTokens: 'Token 消耗量'
      })[metric] || metric;
    }
    function usageMetricValue(point, metric) {
      return Number(point && point[metric] || 0);
    }
    function usageAnalyticsAccounts(data) {
      const selected = new Set(data.selectedAccountIds || []);
      if (!(data.accounts || []).length) return '<span class="muted">号池暂无账号</span>';
      return (data.accounts || []).map(account => `<label class="analytics-account-option" title="${esc(account.label)}"><input type="checkbox" data-analytics-account value="${esc(account.id)}" ${selected.has(account.id) ? 'checked' : ''}><span>${esc(account.label)}</span></label>`).join('');
    }
    function renderUsageAnalyticsChart(data) {
      const points = data.points || [];
      if (!points.length) return '<p class="muted">当前筛选条件没有匹配的时间段。</p>';
      const metric = data.query.metric;
      const labels = [...new Set(points.map(point => point.bucket))];
      const accountIds = data.selectedAccountIds || [];
      const accountLabels = Object.fromEntries((data.accounts || []).map(account => [account.id, account.label]));
      const byKey = new Map(points.map(point => [`${point.accountId}\u0000${point.bucket}`, point]));
      const colors = ['#116b5f', '#3066be', '#b54708', '#7a5af8', '#c11574', '#667085', '#0e9384', '#ca8504', '#2e90fa', '#6938ef', '#dd2590', '#039855', '#dc6803', '#344054', '#4e5ba6', '#c01048', '#0788f5', '#15803d', '#a15c07', '#475467'];
      const width = 960;
      const height = 320;
      const left = 62;
      const right = 22;
      const top = 24;
      const bottom = 58;
      const plotWidth = width - left - right;
      const plotHeight = height - top - bottom;
      const values = points.map(point => usageMetricValue(point, metric));
      const maxValue = Math.max(1, ...values);
      const x = index => labels.length === 1 ? left + plotWidth / 2 : left + index * plotWidth / (labels.length - 1);
      const y = value => top + plotHeight - Math.max(0, value) / maxValue * plotHeight;
      const grid = Array.from({ length: 5 }, (_, index) => {
        const value = maxValue * (4 - index) / 4;
        const py = top + index * plotHeight / 4;
        return `<line x1="${left}" y1="${py}" x2="${width - right}" y2="${py}" stroke="#e4e7ec"/><text x="${left - 9}" y="${py + 4}" text-anchor="end" fill="#667085" font-size="11">${esc(fmtNumber(value))}</text>`;
      }).join('');
      const labelStep = Math.max(1, Math.ceil(labels.length / 8));
      const xLabels = labels.map((label, index) => (index % labelStep === 0 || index === labels.length - 1) ? `<text x="${x(index)}" y="${height - 24}" text-anchor="middle" fill="#667085" font-size="11">${esc(label)}</text>` : '').join('');
      const lines = accountIds.map((accountId, seriesIndex) => {
        const color = colors[seriesIndex % colors.length];
        const seriesPoints = labels.map((label, index) => ({ point: byKey.get(`${accountId}\u0000${label}`), index }));
        const segments = [];
        let segment = [];
        seriesPoints.forEach(item => {
          if (item.point) segment.push(item);
          else if (segment.length) { segments.push(segment); segment = []; }
        });
        if (segment.length) segments.push(segment);
        const polylines = segments.filter(items => items.length > 1).map(items => `<polyline points="${items.map(item => `${x(item.index)},${y(usageMetricValue(item.point, metric))}`).join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`).join('');
        const circles = seriesPoints.map(item => {
          if (!item.point) return '';
          const value = usageMetricValue(item.point, metric);
          return `<circle cx="${x(item.index)}" cy="${y(value)}" r="3.5" fill="${color}"><title>${esc(accountLabels[accountId] || accountId)} · ${esc(item.point.bucket)} · ${esc(usageMetricLabel(metric))} ${esc(fmtNumber(value))}</title></circle>`;
        }).join('');
        return `${polylines}${circles}`;
      }).join('');
      const legend = accountIds.map((accountId, index) => `<span><i style="background:${colors[index % colors.length]}"></i>${esc(accountLabels[accountId] || accountId)}</span>`).join('');
      return `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${esc(usageMetricLabel(metric))}趋势图"><text x="${left}" y="14" fill="#475467" font-size="12">${esc(usageMetricLabel(metric))}</text>${grid}<line x1="${left}" y1="${top + plotHeight}" x2="${width - right}" y2="${top + plotHeight}" stroke="#98a2b3"/>${lines}${xLabels}</svg><div class="analytics-legend">${legend}</div>`;
    }
    function renderUsageAnalyticsTable(data) {
      const rows = data.points || [];
      if (!rows.length) return '';
      return `<div class="analytics-table-wrap"><table><thead><tr><th>时间段</th><th>账号</th><th>任务量</th><th>调用记录</th><th>input</th><th>cached</th><th>output</th><th>总 Token</th><th>单任务平均</th></tr></thead><tbody>${rows.map(point => `<tr><td>${esc(point.bucket)}</td><td>${esc(point.accountLabel || point.accountId)}</td><td>${esc(fmtNumber(point.taskCount))}</td><td>${esc(fmtNumber(point.recordCount))}</td><td>${esc(fmtNumber(point.inputTokens))}</td><td>${esc(fmtNumber(point.cachedInputTokens))}</td><td>${esc(fmtNumber(point.outputTokens))}</td><td>${esc(fmtNumber(point.totalTokens))}</td><td>${esc(fmtNumber(point.averageTokensPerTask))}</td></tr>`).join('')}</tbody></table></div>`;
    }
    function upstreamReasonLabel(value) {
      return ({
        available: '检查通过',
        check_failed: '检查服务返回未知错误',
        missing_access_token: '缺少 access_token',
        missing_chatgpt_account_id: '缺少 chatgptAccountId',
        auth_failed: '认证失败',
        usage_limit: '额度限制',
        rate_limited: '频率限制',
        service_overloaded: 'Codex 服务繁忙',
        check_service_start_failed: '检查服务启动失败',
        check_service_unavailable: '检查服务不可用',
        check_timed_out: '检查超时',
        secret_decrypt_failed: '授权数据无法解密',
        secret_encrypt_failed: '授权刷新结果保存失败',
        state_save_failed: '检查结果保存失败',
        upstream_not_found: '账号不存在',
        short_lived_auth: '短期授权',
        token_expired: '授权已过期',
        refreshable: '可自动续期',
        pending_authorization: '待授权',
        authorizing: '授权准备中',
        action_required: '等待完成授权',
        authorized: '已授权',
        failed: '授权失败',
        codex_oauth_email_mismatch: '授权账号与候选邮箱不一致'
      })[value] || value || '';
    }
    function upstreamAccountCell(up) {
      const name = up.name || up.email || up.id;
      const meta = [up.group || '未分组', up.email && up.email !== name ? up.email : ''].filter(Boolean);
      return `<div class="account-main"><strong>${esc(name)}</strong>${meta.map(x => `<span class="muted">${esc(x)}</span>`).join('')}</div>`;
    }
    function upstreamLimitLines(up) {
      const items = [];
      if (up.creditBalanceLabel) items.push(`credits ${up.creditBalanceLabel}`);
      else if (up.creditBalance !== null && up.creditBalance !== undefined) items.push(`credits ${fmtNumber(up.creditBalance)}`);
      if (up.rateLimitRemainingPercent !== null && up.rateLimitRemainingPercent !== undefined) items.push(`余量约 ${fmtPercent(up.rateLimitRemainingPercent)}`);
      if (up.usageTokens) items.push(`今日已用 ${fmtNumber(up.usageTokens)} token`);
      if (up.rateLimitResetsAt) items.push(`重置 ${fmtTime(up.rateLimitResetsAt)}`);
      return items;
    }
    function upstreamAvailabilityCell(up) {
      const reason = up.entitlementStatus && up.entitlementStatus !== 'available' ? upstreamReasonLabel(up.entitlementStatus) : (up.availabilityStatus !== 'available' ? upstreamReasonLabel(up.entitlementStatus) : '');
      const limitLines = upstreamLimitLines(up);
      const detail = reason || (up.lastCheckedAt ? (limitLines.length ? limitLines.join(' / ') : '无额度数据') : '未检查');
      return `<div class="meta-stack">${availability(up.availabilityStatus)}<span class="muted">${esc(detail)}</span></div>`;
    }
    function upstreamValidity(up) {
      if (!up.expiresAt) return '未记录';
      const expired = Date.now() >= new Date(up.expiresAt).getTime();
      return `<div class="meta-stack"><span>${esc(fmtTime(up.expiresAt))}</span><span class="${expired ? 'status disabled' : 'muted'}">${expired ? '已过期' : '未过期'}</span></div>`;
    }
    function upstreamAuthLine(up) {
      const statusText = upstreamReasonLabel(up.credentialStatus) || '未识别';
      return `<div class="meta-stack"><strong>${esc(statusText)}</strong><span>${upstreamValidity(up)}</span></div>`;
    }
    function upstreamUseUserCell(up) {
      const active = Array.isArray(up.activeUserAccounts) ? up.activeUserAccounts : [];
      if (active.length) {
        const label = active.length > 2 ? `${active.slice(0, 2).join('、')} 等 ${active.length} 人` : active.join('、');
        const limit = Number(up.activeUserLimit || 0);
        const occupancy = limit > 0 ? `${active.length}/${limit}` : `${active.length}`;
        return `<div class="usage-value"><span class="status available">正在使用 ${esc(occupancy)}</span><strong>${esc(label)}</strong></div>`;
      }
      const detail = up.lastUserAccount
        ? `最近使用用户：${up.lastUserAccount}\n使用时间段：${fmtUsagePeriod(up.lastUsedFrom, up.lastUsedAt)}`
        : '暂无最近使用记录';
      const limit = Number(up.activeUserLimit || 0);
      return `<span class="status available idle-usage" title="${esc(detail)}" aria-label="空闲；${esc(detail)}">空闲${limit > 0 ? ` 0/${esc(limit)}` : ''}</span>`;
    }
    function upstreamUsageCell(up) {
      const routed = Number(up.routedUsageTokens || 0);
      const accountUsage = Number(up.usageTokens || 0);
      return `<div class="usage-value"><strong>${esc(fmtNumber(routed))} token</strong><span class="muted">本系统今日${accountUsage && accountUsage !== routed ? ` / 上游统计 ${esc(fmtNumber(accountUsage))}` : ''}</span></div>`;
    }
    function upstreamRemainingCell(up) {
      if (up.checkStatus === 'checking' || state.upstreamCheckingIds.includes(up.id)) {
        return '<div class="usage-value"><span class="status checking">检查中</span><span class="muted">正在读取授权与额度</span></div>';
      }
      const lines = [];
      const reason = up.checkStatus === 'failed'
        ? upstreamReasonLabel(up.checkFailureReason || up.entitlementStatus) || '未知原因'
        : '';
      if (reason) lines.push(`<strong>${esc(reason)}</strong>`);
      if (up.rateLimitRemainingPercent !== null && up.rateLimitRemainingPercent !== undefined) lines.push(`<strong>${esc(fmtPercent(up.rateLimitRemainingPercent))}</strong>`);
      if (up.creditBalanceLabel) lines.push(`<span class="muted">credits ${esc(up.creditBalanceLabel)}</span>`);
      else if (up.creditBalance !== null && up.creditBalance !== undefined) lines.push(`<span class="muted">credits ${esc(fmtNumber(up.creditBalance))}</span>`);
      if (up.rateLimitResetsAt) lines.push(`<span class="muted">${esc(fmtTime(up.rateLimitResetsAt))} 重置</span>`);
      if (lines.length) {
        lines.push(`<span class="muted">检查于 ${esc(fmtTime(up.lastCheckedAt))}</span>`);
        return `<div class="usage-value">${lines.join('')}</div>`;
      }
      if (up.lastCheckedAt) {
        return `<div class="usage-value"><strong>已检查，无额度数据</strong><span class="muted">${esc(fmtTime(up.lastCheckedAt))}</span></div>`;
      }
      return '<span class="muted">未检查</span>';
    }
    function upstreamStatusCell(up, key) {
      const checking = up.checkStatus === 'checking' || state.upstreamCheckingIds.includes(up.id);
      if (checking) {
        return '<div class="meta-stack"><span class="status checking">检查中</span><span class="muted">正在检查账号</span></div>';
      }
      const failureReason = up.checkStatus === 'failed' ? upstreamReasonLabel(up.checkFailureReason || up.entitlementStatus) || '未知原因' : '';
      const detail = failureReason ? `检查失败：${failureReason}` : upstreamReasonLabel(up.credentialStatus) || '未识别';
      return `<div class="meta-stack">${up.availabilityStatus === 'available' && key.status === 'active' ? availability('available') : availability('unavailable')}<span class="muted">${esc(detail)}</span>${key.id ? `<span class="switch-slot"><button class="switch-toggle ${key.status === 'active' ? 'enabled' : ''}" data-api-key-status="${esc(key.id)}" data-value="${key.status === 'active' ? 'disabled' : 'active'}" title="${key.status === 'active' ? '关闭' : '启用'}"></button></span>` : ''}</div>`;
    }
    function apiKeyPrimaryCell(key) {
      return `<div class="account-main"><strong>${esc(key.keyPreview || key.id)}</strong><span class="muted">创建 ${esc(fmtTime(key.createdAt))}</span></div>`;
    }
    function apiKeyAccountDetail(key) {
      const up = key.upstream || {};
      if (!up.id) return '<details class="account-detail"><summary>详情</summary><span class="muted">未绑定授权</span></details>';
      return `<details class="account-detail">
        <summary>详情</summary>
        <div class="detail-grid">
          <span>授权来源</span><span>${upstreamAccountCell(up)}</span>
          <span>套餐</span><span>${esc(up.subscriptionTier || '未识别')}</span>
          <span>授权</span><span>${upstreamAuthLine(up)}</span>
          <span>额度</span><span>${upstreamAvailabilityCell(up)}</span>
          <span>最近检查</span><span>${esc(fmtTime(up.lastCheckedAt) || '未检查')}</span>
        </div>
      </details>`;
    }
    function topupPayload(item, overrides = {}) {
      const src = { ...item, ...overrides };
      return {
        name: src.name || '',
        priceCents: Number(src.priceCents || 0),
        tokens: Number(src.tokens || 0),
        enabled: Boolean(src.enabled),
        sort: Number(src.sort || 0),
        description: src.description || ''
      };
    }
    function stopCodexOAuthPoll() {
      if (codexOAuthPollTimer) {
        clearInterval(codexOAuthPollTimer);
        codexOAuthPollTimer = 0;
      }
    }
    function scheduleUpstreamUsageRefresh() {
      if (upstreamUsageRefreshTimer) clearTimeout(upstreamUsageRefreshTimer);
      upstreamUsageRefreshTimer = 0;
      if (state.tab !== 'upstreams' || state.upstreamPanel || state.upstreamRemarkId || state.codexOAuth || state.upstreamCheckingIds.length) return;
      upstreamUsageRefreshTimer = setTimeout(() => {
        upstreamUsageRefreshTimer = 0;
        if (state.tab === 'upstreams' && !state.upstreamPanel && !state.upstreamRemarkId && !state.codexOAuth && !state.upstreamCheckingIds.length) renderUpstreams().catch(() => {});
      }, 5000);
    }
    function startCodexOAuthPoll(oauthState) {
      stopCodexOAuthPoll();
      codexOAuthPollTimer = setInterval(async () => {
        try {
          const data = await request('/admin/codex-oauth/status?' + qs({ state: oauthState }));
          if (data.status === 'imported') {
            stopCodexOAuthPoll();
            const label = [data.accountName, data.keyPreview].filter(Boolean).join(' / ');
            state.upstreamMsg = label ? `已导入 Codex 授权：${label}` : '已导入 Codex 授权';
            state.codexOAuth = null;
            renderUpstreams();
          } else if (data.status === 'failed') {
            stopCodexOAuthPoll();
            state.upstreamMsg = `Codex 授权失败：${upstreamReasonLabel(data.error) || data.error || '未知原因'}`;
            state.codexOAuth = { ...(state.codexOAuth || {}), ...data };
            renderUpstreams();
          }
        } catch {
          stopCodexOAuthPoll();
        }
      }, 1500);
    }

    async function beginCodexOAuth(method, upstreamId = '') {
      const popup = window.open('about:blank', '_blank');
      state.upstreamMsg = '正在准备 Codex 授权';
      try {
        const data = await request('/admin/codex-oauth/start', { method: 'POST', body: JSON.stringify({ method, upstreamId }) });
        const authUrl = data.verificationUrl || data.authorizeUrl;
        if (popup && authUrl) popup.location.href = authUrl;
        else if (authUrl) window.location.href = authUrl;
        state.codexOAuth = { ...data, method, upstreamId };
        state.upstreamMsg = data.userCode ? `已打开 Codex 授权页，验证码：${data.userCode}` : '已打开 Codex 授权页';
        startCodexOAuthPoll(data.state);
      } catch (err) {
        if (popup) popup.close();
        state.upstreamMsg = `Codex 授权启动失败：${upstreamReasonLabel(err.message) || err.message}`;
      }
      renderUpstreams();
    }

    async function render() {
      const tab = state.tab;
      if (tab === 'overview') return renderOverview();
      if (tab === 'users') return renderUsers();
      if (tab === 'topups') return renderTopups();
      if (tab === 'orders') return renderOrders();
      if (tab === 'recharges') return renderRecharges();
      if (tab === 'upstreams') return renderUpstreams();
      if (tab === 'devices') return renderDevices();
      if (tab === 'usage') return renderUsage();
    }

              <button data-refresh>刷新</button>

            <tbody>${data.items.map(p => `<tr><td>${esc(p.name)}</td><td>${esc(money(p.priceCents))}</td><td>${esc(p.tokens)}</td><td>${esc(p.sort)}</td><td>${p.enabled ? status('active') : status('disabled')}</td><td>${esc(p.description || '')}</td><td>${esc(fmtTime(p.createdAt))}</td><td>${esc(fmtTime(p.updatedAt))}</td><td class="row-actions"><button data-edit-topup="${esc(p.id)}">修改</button><button data-toggle-topup="${esc(p.id)}">${p.enabled ? '停用' : '启用'}</button></td></tr>`).join('')}</tbody></table>
            ${pager(data, 'topups')}
          </div>
        </div>`;

        e.preventDefault();

          await request(`/admin/topups/${editing.id}`, { method: 'PATCH', body: JSON.stringify(payload) });
          state.topupEditId = '';
        } else {
          await request('/admin/topups', { method: 'POST', body: JSON.stringify(payload) });
        }
        renderTopups();
      };
      const cancelEdit = document.querySelector('[data-cancel-topup-edit]');
      if (cancelEdit) cancelEdit.onclick = () => { state.topupEditId = ''; renderTopups(); };

        state.topupQ = $('topupSearch').value.trim();

        renderTopups();

      document.querySelectorAll('[data-toggle-topup]').forEach(btn => btn.onclick = async () => {
        const item = data.items.find(x => x.id === btn.dataset.toggleTopup);

      document.querySelectorAll('[data-edit-topup]').forEach(btn => btn.onclick = async () => {
        const item = data.items.find(x => x.id === btn.dataset.editTopup);
        if (!item) return;
        state.topupEditId = item.id;
        renderTopups();
      });
      bindPager('topups', (page) => { state.topupsPage = page; renderTopups(); });
      document.querySelector('[data-refresh]').onclick = renderTopups;

    async function renderUpstreams() {
      const renderRevision = ++upstreamRenderRevision;
      const requestedPage = state.upstreamPage;
      const requestedAvailable = state.upstreamAvailable;
      const [keys, upstreams, pending] = await Promise.all([
        request('/admin/api-keys?' + qs({ page: 1, size: 100 })),
        request('/admin/upstreams?' + qs({ authorization: 'authorized', available: requestedAvailable, page: requestedPage, size: 10 })),
        request('/admin/upstreams?' + qs({ authorization: 'pending', page: 1, size: 100 }))
      ]);
      if (renderRevision !== upstreamRenderRevision || state.tab !== 'upstreams') return;
      const candidates = pending.items;
      const remarkTarget = [...upstreams.items, ...candidates].find(up => up.id === state.upstreamRemarkId);
      const upstreamFormPanel = state.upstreamPanel === 'import' ? `
        <form id="upImportForm" class="panel grid">
          <div class="toolbar"><h2>添加号池账号</h2><button type="button" class="panel-close" data-close-upstream-panel aria-label="关闭添加账号">关闭</button></div>
          <p class="muted">支持 ChatGPT session JSON、邮箱密码、Codex auth.json、Sub2API 账号备份、Token JSON 和现有纯 Token 文本。邮箱密码会加密暂存为待授权账号，授权完成前不会进入调度。</p>
          <div class="session-import">
            <div><strong>从已登录的 ChatGPT 会话导入</strong><span class="muted">打开会话 JSON，复制页面全部内容并粘贴到下方。后端会提取所需授权字段、加密保存并生成号池 Key；不会保存头像等无关会话资料。</span></div>

          </div>
          <div class="upstream-form-grid">
            <label>选择导入文件<input id="upstreamImportFile" type="file" accept="application/json,text/plain,text/csv,.json,.txt,.csv"></label>
            <label>账号或授权内容<textarea id="upstreamImportJson" class="upstream-json" spellcheck="false" placeholder="直接粘贴 ChatGPT session JSON&#10;&#10;也支持：&#10;邮箱,密码&#10;user@example.com,password&#10;&#10;Codex auth.json 或 Sub2API 备份"></textarea></label>
          </div>
          <div class="upstream-panel-actions"><button class="primary">识别并导入</button></div>
        </form>` : '';
      const oauthPanel = state.codexOAuth ? `
        <div class="panel grid">
          <div class="toolbar"><h2>正在授权${state.codexOAuth.accountName ? `：${esc(state.codexOAuth.accountName)}` : ''}</h2><button type="button" class="panel-close" data-close-oauth-panel aria-label="关闭授权">关闭</button></div>
          ${state.codexOAuth.userCode ? `<p>设备验证码：<strong>${esc(state.codexOAuth.userCode)}</strong></p>` : ''}
          <p class="muted">请在已打开的官方授权页完成登录。${state.codexOAuth.authMethod === 'app_server_browser' ? '浏览器最后跳转到 localhost 页面时，复制地址栏中的完整回调地址并粘贴到下面。' : '设备码流程完成后会自动入池。'}</p>
          ${state.codexOAuth.authMethod === 'app_server_browser' ? `<form id="codexCallbackForm" class="grid"><label>完整回调地址<input id="codexCallbackUrl" type="url" required placeholder="http://localhost:&lt;port&gt;/auth/callback?code=...&amp;state=..."></label><div><button class="primary">提交回调并完成授权</button></div></form>` : ''}
        </div>` : '';
      const remarkPanel = remarkTarget ? `
        <form id="upstreamRemarkForm" class="panel grid remark-editor">
          <div class="toolbar"><h2>账号备注：${esc(remarkTarget.name || remarkTarget.email || remarkTarget.id)}</h2><button type="button" class="panel-close" data-close-upstream-remark aria-label="关闭备注编辑">关闭</button></div>
          <label>备注<textarea id="upstreamRemark" maxlength="500" placeholder="例如：购买批次、用途或账号注意事项">${esc(remarkTarget.remark || '')}</textarea></label>
          <div class="upstream-panel-actions"><button class="primary">保存备注</button></div>
        </form>` : '';
      $('content').innerHTML = `
        <div class="grid">
          <div class="page-head">
            <h2>号池账号与 API Key</h2>

              <select id="upstreamAvailable"><option value="">全部账号</option><option value="true" ${state.upstreamAvailable === 'true' ? 'selected' : ''}>可用账号</option></select>
              <button data-upstream-filter>筛选</button>
              <button data-refresh-upstreams>刷新</button>
              <button data-export-upstreams>导出号池</button>
              <button data-start-codex-oauth data-method="device_code">设备码授权</button>
              <button data-start-codex-oauth data-method="browser">浏览器授权</button>
              <button data-open-upstream-panel="import" class="primary">添加账号</button>
            </div>
          </div>
          ${upstreamFormPanel}
          ${oauthPanel}
          ${remarkPanel}
          <p id="upstreamMsg" class="msg">${esc(state.upstreamMsg)}</p>
          ${(upstreams.onlineClientAccounts || []).length || (upstreams.activeClientAccounts || []).length ? `<div class="runtime-summary">${(upstreams.onlineClientAccounts || []).length ? `<span><strong>客户端在线</strong> ${esc(upstreams.onlineClientAccounts.join('、'))}</span>` : ''}${(upstreams.activeClientAccounts || []).length ? `<span><strong>Codex 运行中</strong> ${esc(upstreams.activeClientAccounts.join('、'))}</span>` : ''}${(upstreams.unassignedClientAccounts || []).length ? `<span class="muted">待首次任务分配：${esc(upstreams.unassignedClientAccounts.join('、'))}</span>` : ''}</div>` : ''}
          ${candidates.length ? `<div class="panel grid">
            <h2>待授权账号（${candidates.length}）</h2>
            <div class="table-wrap"><table><thead><tr><th>账号</th><th>来源</th><th>状态</th><th>操作</th></tr></thead><tbody>${candidates.map(up => `<tr>
              <td>${upstreamAccountCell(up)}</td>
              <td>${esc(({ chatgpt_session: 'ChatGPT session', email_password: '邮箱密码', sub2api: 'Sub2API', codex_auth_json: 'Codex auth.json', token_json: 'Token JSON' })[up.sourceType] || up.sourceType || '未识别')}</td>
              <td><div class="meta-stack">${status(up.authorizationStatus)}<span class="muted">${up.hasPassword ? '密码已加密暂存' : '无暂存密码'}${up.lastAuthorizationError ? ` / ${esc(upstreamReasonLabel(up.lastAuthorizationError))}` : ''}</span></div></td>
              <td class="row-actions"><button class="primary" data-authorize-candidate="${esc(up.id)}" data-method="browser">浏览器授权</button><button data-authorize-candidate="${esc(up.id)}" data-method="device_code">设备码</button><button data-edit-upstream-remark="${esc(up.id)}">备注</button><button class="danger" data-delete-candidate="${esc(up.id)}">删除</button></td>

          </div>` : ''}
          <div class="table-wrap">
            <table class="usage-priority-table"><colgroup><col style="width:18%"><col style="width:13%"><col style="width:13%"><col style="width:13%"><col style="width:15%"><col style="width:14%"><col style="width:14%"></colgroup><thead><tr><th>号池账号</th><th>使用用户</th><th>今日使用</th><th>账号剩余</th><th>备注</th><th>状态</th><th>操作</th></tr></thead>

              const key = keys.items.find(k => k.upstreamAccountId === up.id) || {};
              const checking = up.checkStatus === 'checking' || state.upstreamCheckingIds.includes(up.id);
              return `<tr>
                <td>${upstreamAccountCell(up)}<span class="muted">${esc(key.keyPreview || '未生成 Key')}</span></td>
                <td>${upstreamUseUserCell(up)}</td>
                <td>${upstreamUsageCell(up)}</td>
                <td data-upstream-remaining>${upstreamRemainingCell(up)}</td>
                <td><span class="${up.remark ? 'remark-cell' : 'muted'}" title="${esc(up.remark || '')}">${esc(up.remark || '—')}</span></td>
                <td data-upstream-status>${upstreamStatusCell(up, key)}</td>
                <td class="row-actions"><button data-check="${esc(up.id)}" ${checking ? 'disabled' : ''}>${checking ? '检查中' : '检查'}</button><button data-edit-upstream-remark="${esc(up.id)}">备注</button>${key.id ? `<button class="danger" data-api-key-delete="${esc(key.id)}">删除</button>` : `<button class="danger" data-delete-candidate="${esc(up.id)}">删除</button>`}</td>
              </tr>`;
            }).join('')}</tbody></table>
          </div>
          ${pager(upstreams, 'upstreams')}
        </div>`;
      if ($('upImportForm')) $('upImportForm').onsubmit = async (e) => {
        e.preventDefault();
        const raw = $('upstreamImportJson').value.trim();
        if (!raw) {
          state.upstreamMsg = '请选择或粘贴导入内容';
          renderUpstreams();
          return;
        }
        try {
          const data = await request('/admin/upstreams/import', { method: 'POST', body: JSON.stringify({ content: raw }) });
          state.upstreamPanel = '';
          state.upstreamMsg = `新增 ${data.imported || 0} 条，更新 ${data.updated || 0} 条，其中 ${data.pending || 0} 条待授权，生成或返回 ${(data.apiKeys || []).length} 个 API Key`;
        } catch (err) {
          state.upstreamMsg = err.message === 'invalid_upstream_import_request' ? '未识别到可导入的账号或授权材料' : `导入失败：${err.message}`;
        }
        renderUpstreams();
      };
      if ($('upstreamImportFile')) $('upstreamImportFile').onchange = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        $('upstreamImportJson').value = await file.text();
      };
      document.querySelectorAll('[data-close-upstream-panel]').forEach(btn => btn.onclick = () => {
        state.upstreamPanel = '';
        renderUpstreams();
      });
      document.querySelectorAll('[data-open-upstream-panel]').forEach(btn => btn.onclick = () => {
        state.upstreamRemarkId = '';
        state.upstreamPanel = btn.dataset.openUpstreamPanel;
        state.upstreamMsg = '';
        renderUpstreams();
      });
      document.querySelectorAll('[data-edit-upstream-remark]').forEach(btn => btn.onclick = () => {
        state.upstreamPanel = '';
        state.upstreamRemarkId = btn.dataset.editUpstreamRemark;
        state.upstreamMsg = '';
        renderUpstreams();
      });

      if (closeRemark) closeRemark.onclick = () => {
        state.upstreamRemarkId = '';
        renderUpstreams();
      };
      if ($('upstreamRemarkForm')) $('upstreamRemarkForm').onsubmit = async (e) => {
        e.preventDefault();
        try {
          await request(`/admin/upstreams/${state.upstreamRemarkId}/remark`, { method: 'POST', body: JSON.stringify({ remark: $('upstreamRemark').value.trim() }) });

          state.upstreamMsg = '备注已保存';
        } catch (err) {
          state.upstreamMsg = err.message === 'invalid_upstream_remark_request' ? '备注不能超过 500 个字符' : `备注保存失败：${err.message}`;
        }
        renderUpstreams();
      };
      document.querySelectorAll('[data-start-codex-oauth]').forEach(btn => btn.onclick = () => beginCodexOAuth(btn.dataset.method));
      document.querySelectorAll('[data-authorize-candidate]').forEach(btn => btn.onclick = () => beginCodexOAuth(btn.dataset.method, btn.dataset.authorizeCandidate));
      document.querySelectorAll('[data-delete-candidate]').forEach(btn => btn.onclick = async () => {
        await request(`/admin/upstreams/${btn.dataset.deleteCandidate}`, { method: 'DELETE' });
        state.upstreamMsg = '已删除待授权账号';
        renderUpstreams();
      });
      const closeOAuth = document.querySelector('[data-close-oauth-panel]');
      if (closeOAuth) closeOAuth.onclick = async () => {
        stopCodexOAuthPoll();
        const oauthState = state.codexOAuth && state.codexOAuth.state;
        state.codexOAuth = null;
        if (oauthState) {
          try {
            await request('/admin/codex-oauth/cancel', { method: 'POST', body: JSON.stringify({ state: oauthState }) });
            state.upstreamMsg = '已关闭授权';
          } catch {
            state.upstreamMsg = '授权窗口已关闭';
          }
        }
        renderUpstreams();
      };
      if ($('codexCallbackForm')) $('codexCallbackForm').onsubmit = async (e) => {
        e.preventDefault();
        try {
          await request('/admin/codex-oauth/callback', { method: 'POST', body: JSON.stringify({ state: state.codexOAuth.state, callbackUrl: $('codexCallbackUrl').value.trim() }) });
          state.upstreamMsg = '回调已提交，正在完成授权';
        } catch (err) {
          state.upstreamMsg = `回调提交失败：${upstreamReasonLabel(err.message) || err.message}`;
        }
        renderUpstreams();
      };
      document.querySelectorAll('[data-check]').forEach(btn => btn.onclick = async () => {
        const upstreamId = btn.dataset.check;
        if (state.upstreamCheckingIds.includes(upstreamId)) return;
        state.upstreamCheckingIds = [...state.upstreamCheckingIds, upstreamId];
        if (upstreamUsageRefreshTimer) clearTimeout(upstreamUsageRefreshTimer);
        upstreamUsageRefreshTimer = 0;
        btn.disabled = true;
        btn.textContent = '检查中';
        state.upstreamMsg = '正在检查授权';
        if ($('upstreamMsg')) $('upstreamMsg').textContent = state.upstreamMsg;
        const row = btn.closest('tr');
        const remainingCell = row && row.querySelector('[data-upstream-remaining]');
        const statusCell = row && row.querySelector('[data-upstream-status]');
        if (remainingCell) remainingCell.innerHTML = '<div class="usage-value"><span class="status checking">检查中</span><span class="muted">正在读取授权与额度</span></div>';
        if (statusCell) statusCell.innerHTML = '<div class="meta-stack"><span class="status checking">检查中</span><span class="muted">正在检查账号</span></div>';
        try {
          const checked = await request(`/admin/upstreams/${upstreamId}/check`, { method: 'POST' });
          if (checked.checkStatus === 'failed') {
            const reason = upstreamReasonLabel(checked.checkFailureReason || checked.entitlementStatus) || '未知原因';
            state.upstreamMsg = `检查失败：${reason}`;
          } else {
            state.upstreamMsg = '已完成授权检查';
          }
        } catch (err) {
          const reason = upstreamReasonLabel(err.message) || '未知原因';
          state.upstreamMsg = `检查失败：${reason}`;
        } finally {
          state.upstreamCheckingIds = state.upstreamCheckingIds.filter(id => id !== upstreamId);
        }
        renderUpstreams();
      });
      document.querySelectorAll('[data-api-key-status]').forEach(btn => btn.onclick = async () => {
        await request(`/admin/api-keys/${btn.dataset.apiKeyStatus}/status`, { method: 'POST', body: JSON.stringify({ status: btn.dataset.value }) });
        state.upstreamMsg = '已更新 API Key 状态';
        renderUpstreams();
      });
      document.querySelectorAll('[data-api-key-delete]').forEach(btn => btn.onclick = async () => {
        await request(`/admin/api-keys/${btn.dataset.apiKeyDelete}`, { method: 'DELETE' });
        state.upstreamMsg = '已删除 API Key';
        renderUpstreams();
      });
      document.querySelector('[data-upstream-filter]').onclick = () => {
        state.upstreamAvailable = $('upstreamAvailable').value;
        state.upstreamPage = 1;
        state.upstreamMsg = '';
        renderUpstreams();
      };
      document.querySelector('[data-refresh-upstreams]').onclick = renderUpstreams;
      document.querySelector('[data-export-upstreams]').onclick = async () => {
        try {
          await downloadAdminJSON('/admin/upstreams/export');
          state.upstreamMsg = '号池已导出';
        } catch (err) {
          if (err.message === 'reauth_required') {
            requireFreshAdminLogin();
            return;
          }
          state.upstreamMsg = `导出失败：${err.message}`;
        }
        renderUpstreams();
      };
      bindPager('upstreams', (page) => { state.upstreamPage = page; renderUpstreams(); });
      scheduleUpstreamUsageRefresh();
    }

    async function renderDevices() {
      const data = await request('/admin/devices?' + qs({ page: state.devicePage, size: 10 }));
      $('content').innerHTML = `<div class="toolbar"><button data-refresh>刷新</button></div><table><thead><tr><th>用户</th><th>设备</th><th>状态</th><th>最近检查</th><th>操作</th></tr></thead><tbody>${data.items.map(d => `<tr><td>${esc(d.userAccount)}</td><td>${esc(d.name)}</td><td>${availability(d.status)}</td><td>${esc(fmtTime(d.lastSeenAt))}</td><td><button data-device="${esc(d.id)}" data-value="${d.status === 'active' ? 'disabled' : 'active'}">${d.status === 'active' ? '停用' : '启用'}</button></td></tr>`).join('')}</tbody></table>${pager(data, 'devices')}`;
      document.querySelectorAll('[data-device]').forEach(btn => btn.onclick = async () => { await request(`/admin/devices/${btn.dataset.device}/status`, { method: 'POST', body: JSON.stringify({ status: btn.dataset.value }) }); renderDevices(); });
      bindPager('devices', (page) => { state.devicePage = page; renderDevices(); });
      document.querySelector('[data-refresh]').onclick = renderDevices;
    }

    async function renderUsage() {
      const analyticsPath = '/admin/usage/analytics?' + qs({
        accountIds: state.usageAnalyticsAccounts.join(','),
        from: state.usageAnalyticsFrom,
        to: state.usageAnalyticsTo,
        groupBy: state.usageAnalyticsGroupBy,
        metric: state.usageAnalyticsMetric,
        timezone: state.usageAnalyticsTimezone,
        minTasks: state.usageAnalyticsMinTasks,
        maxTasks: state.usageAnalyticsMaxTasks,
        minTokens: state.usageAnalyticsMinTokens,
        maxTokens: state.usageAnalyticsMaxTokens
      });
      const [analytics, usage, ledger, audit] = await Promise.all([
        request(analyticsPath),
        request('/admin/usage?' + qs({ page: state.usagePage, size: 10, today: state.usageToday })),
        request('/admin/ledger?' + qs({ page: state.ledgerPage, size: 10 })),
        request('/admin/audit?' + qs({ page: state.auditPage, size: 10 }))
      ]);
      state.usageAnalyticsAccounts = analytics.selectedAccountIds || [];
      state.usageAnalyticsFrom = analytics.query.from;
      state.usageAnalyticsTo = analytics.query.to;
      state.usageAnalyticsGroupBy = analytics.query.groupBy;
      state.usageAnalyticsMetric = analytics.query.metric;
      state.usageAnalyticsTimezone = analytics.query.timezone;
      state.usageAnalyticsMinTasks = analytics.query.minTasks ?? '';
      state.usageAnalyticsMaxTasks = analytics.query.maxTasks ?? '';
      state.usageAnalyticsMinTokens = analytics.query.minTokens ?? '';
      state.usageAnalyticsMaxTokens = analytics.query.maxTokens ?? '';
      const summary = analytics.summary || {};
      const quality = analytics.dataQuality || {};
      const fallbackNote = Number(quality.historicalFallback || 0) > 0
        ? `<p class="analytics-note warn">其中 ${esc(fmtNumber(quality.historicalFallback))} 条历史调用没有会话标识，已按每条调用计为一个任务；新产生的调用将按 Codex 会话统计。</p>`
        : '<p class="analytics-note">当前匹配记录均带有会话标识，可按任务口径聚合。</p>';
      $('content').innerHTML = `<div class="grid">
        <div class="panel">
          <div class="page-head"><div><h2>账号 Token 统计</h2><p class="analytics-note">按号池账号和时间段查看任务量与 Token 消耗。范围条件作用于每个“账号 × 时间段”的聚合结果。</p></div><button data-analytics-reset>恢复默认</button></div>
          <div class="analytics-filter-grid">
            <div class="analytics-account-field"><span class="metric">号池账号（可多选）</span><div class="analytics-accounts">${usageAnalyticsAccounts(analytics)}</div></div>
            <label>开始日期<input id="analyticsFrom" type="date" value="${esc(state.usageAnalyticsFrom)}"></label>
            <label>结束日期<input id="analyticsTo" type="date" value="${esc(state.usageAnalyticsTo)}"></label>
            <label>时间粒度<select id="analyticsGroupBy"><option value="day" ${state.usageAnalyticsGroupBy === 'day' ? 'selected' : ''}>按日</option><option value="week" ${state.usageAnalyticsGroupBy === 'week' ? 'selected' : ''}>按周</option><option value="month" ${state.usageAnalyticsGroupBy === 'month' ? 'selected' : ''}>按月</option></select></label>
            <label>图表指标<select id="analyticsMetric"><option value="averageTokensPerTask" ${state.usageAnalyticsMetric === 'averageTokensPerTask' ? 'selected' : ''}>单任务平均 Token</option><option value="taskCount" ${state.usageAnalyticsMetric === 'taskCount' ? 'selected' : ''}>任务量</option><option value="totalTokens" ${state.usageAnalyticsMetric === 'totalTokens' ? 'selected' : ''}>Token 消耗量</option></select></label>
            <label>时区<select id="analyticsTimezone"><option value="Asia/Shanghai" ${state.usageAnalyticsTimezone === 'Asia/Shanghai' ? 'selected' : ''}>北京时间</option><option value="UTC" ${state.usageAnalyticsTimezone === 'UTC' ? 'selected' : ''}>UTC</option></select></label>
            <label>任务量下限<input id="analyticsMinTasks" type="number" min="0" step="1" placeholder="不限" value="${esc(state.usageAnalyticsMinTasks)}"></label>
            <label>任务量上限<input id="analyticsMaxTasks" type="number" min="0" step="1" placeholder="不限" value="${esc(state.usageAnalyticsMaxTasks)}"></label>
            <label>Token 下限<input id="analyticsMinTokens" type="number" min="0" step="1" placeholder="不限" value="${esc(state.usageAnalyticsMinTokens)}"></label>
            <label>Token 上限<input id="analyticsMaxTokens" type="number" min="0" step="1" placeholder="不限" value="${esc(state.usageAnalyticsMaxTokens)}"></label>
            <div class="analytics-actions"><button class="primary" data-analytics-apply>应用筛选</button></div>
          </div>
          <div class="cards analytics-cards">
            <div class="card metric">任务量<strong>${esc(fmtNumber(summary.taskCount))}</strong></div>
            <div class="card metric">Token 消耗量<strong>${esc(fmtNumber(summary.totalTokens))}</strong></div>
            <div class="card metric">单任务平均 Token<strong>${esc(fmtNumber(summary.averageTokensPerTask))}</strong></div>
            <div class="card metric">匹配时间段<strong>${esc(fmtNumber(summary.matchedBuckets))}</strong></div>
          </div>
          <div class="analytics-chart">${renderUsageAnalyticsChart(analytics)}</div>
          ${fallbackNote}
          <p class="analytics-note">统计口径：${esc(quality.taskDefinition || '')}。数据源：${esc(analytics.source || 'usage_records')}。</p>
          ${renderUsageAnalyticsTable(analytics)}
        </div>
        <div class="panel"><div class="toolbar"><h2>用量明细</h2><select id="usageToday"><option value="" ${state.usageToday === '' ? 'selected' : ''}>全部</option><option value="true" ${state.usageToday === 'true' ? 'selected' : ''}>今日</option></select><button data-usage-filter>筛选</button></div><table><thead><tr><th>时间</th><th>号池账号</th><th>用户</th><th>模型</th><th>input</th><th>cached</th><th>output</th><th>total</th></tr></thead><tbody>${usage.items.map(u => `<tr><td>${esc(fmtTime(u.createdAt))}</td><td>${esc(u.upstreamAccount || u.upstreamAccountId || '')}</td><td>${esc(u.userAccount || u.userId)}</td><td>${esc(u.model)}</td><td>${esc(u.inputTokens)}</td><td>${esc(u.cachedInputTokens)}</td><td>${esc(u.outputTokens)}</td><td>${esc(u.totalTokens)}</td></tr>`).join('')}</tbody></table>${pager(usage, 'usage')}</div>
        <div class="panel"><h2>token 流水</h2><table><thead><tr><th>时间</th><th>用户</th><th>类型</th><th>token 变动</th><th>变动后余额</th><th>来源</th></tr></thead><tbody>${ledger.items.map(x => `<tr><td>${esc(fmtTime(x.createdAt))}</td><td>${esc(x.userAccount || x.userId)}</td><td>${esc(x.typeLabel || x.type)}</td><td>${esc(x.deltaTokens)}</td><td>${esc(x.balanceAfter)}</td><td>${esc(x.source)}</td></tr>`).join('')}</tbody></table>${pager(ledger, 'ledger')}</div>
        <div class="panel"><h2>审计</h2><table><thead><tr><th>时间</th><th>操作者</th><th>角色</th><th>动作</th><th>目标</th><th>详情</th></tr></thead><tbody>${audit.items.map(a => `<tr><td>${esc(fmtTime(a.createdAt))}</td><td>${esc(a.actorAccount || a.actorId || '')}</td><td>${esc(a.actorRole || '')}</td><td>${esc(a.action)}</td><td>${esc(a.targetId || '')}</td><td>${esc(a.detail || '')}</td></tr>`).join('')}</tbody></table>${pager(audit, 'audit')}</div>
      </div>`;
      document.querySelector('[data-analytics-apply]').onclick = () => {
        state.usageAnalyticsAccounts = [...document.querySelectorAll('[data-analytics-account]:checked')].map(input => input.value);
        state.usageAnalyticsFrom = $('analyticsFrom').value;
        state.usageAnalyticsTo = $('analyticsTo').value;
        state.usageAnalyticsGroupBy = $('analyticsGroupBy').value;
        state.usageAnalyticsMetric = $('analyticsMetric').value;
        state.usageAnalyticsTimezone = $('analyticsTimezone').value;
        state.usageAnalyticsMinTasks = $('analyticsMinTasks').value;
        state.usageAnalyticsMaxTasks = $('analyticsMaxTasks').value;
        state.usageAnalyticsMinTokens = $('analyticsMinTokens').value;
        state.usageAnalyticsMaxTokens = $('analyticsMaxTokens').value;
        renderUsage();
      };
      document.querySelector('[data-analytics-reset]').onclick = () => {
        state.usageAnalyticsAccounts = [];
        state.usageAnalyticsFrom = '';
        state.usageAnalyticsTo = '';
        state.usageAnalyticsGroupBy = 'day';
        state.usageAnalyticsMetric = 'averageTokensPerTask';
        state.usageAnalyticsTimezone = 'Asia/Shanghai';
        state.usageAnalyticsMinTasks = '';
        state.usageAnalyticsMaxTasks = '';
        state.usageAnalyticsMinTokens = '';
        state.usageAnalyticsMaxTokens = '';
        renderUsage();
      };
      document.querySelector('[data-usage-filter]').onclick = () => {
        state.usageToday = $('usageToday').value;
        state.usagePage = 1;
        renderUsage();
      };
      bindPager('usage', (page) => { state.usagePage = page; renderUsage(); });
      bindPager('ledger', (page) => { state.ledgerPage = page; renderUsage(); });
      bindPager('audit', (page) => { state.auditPage = page; renderUsage(); });
    }

    function pager(data, key) {
      const page = Number(data.page || 1);
      const totalPages = Number(data.totalPages || 0);
      return `<div class="pager">
        <button data-page="${esc(key)}" data-value="${page - 1}" ${page <= 1 ? 'disabled' : ''}>上一页</button>
        <span>${esc(page)} / ${esc(Math.max(1, totalPages))}，共 ${esc(Number(data.total || 0))} 条</span>
        <button data-page="${esc(key)}" data-value="${page + 1}" ${totalPages === 0 || page >= totalPages ? 'disabled' : ''}>下一页</button>
      </div>`;
    }

    function bindPager(key, onPage) {
      document.querySelectorAll(`[data-page="${key}"]`).forEach(btn => btn.onclick = () => {
        const page = Number(btn.dataset.value || 1);
        if (page > 0) onPage(page);
      });
    }

    function setTab(tab) {
      if (upstreamUsageRefreshTimer) clearTimeout(upstreamUsageRefreshTimer);
      upstreamUsageRefreshTimer = 0;
      upstreamRenderRevision++;
      state.tab = tab;
      document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      render().catch(err => {
        if (err.message === 'password_change_required') {
          $('app').classList.add('hidden');
          $('auth').classList.remove('hidden');
          $('newPasswordWrap').classList.remove('hidden');
          $('authHint').textContent = '请完成首轮更改账户密码';
          $('authAction').textContent = '保存新密码';
          return;
        }
        $('content').innerHTML = `<p class="msg err">${esc(err.message)}</p>`;
      });
    }

    $('authAction').onclick = authAction;
    $('logout').onclick = () => { localStorage.removeItem('adminToken'); location.reload(); };
    document.querySelectorAll('#tabs button').forEach(btn => btn.onclick = () => setTab(btn.dataset.tab));
    bootstrap();
  </script>
</body>
</html>
