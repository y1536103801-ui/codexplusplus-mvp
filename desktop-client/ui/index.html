<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex+++</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d7dde5;
      --text: #1d2633;
      --muted: #667085;
      --brand: #0f6b5d;
      --soft: #e7f4f1;
      --danger: #b42318;
      --ok: #087443;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    .shell { max-width: 1120px; margin: 0 auto; padding: 22px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    h1 { font-size: 20px; margin: 0; }
    h2 { font-size: 16px; margin: 0 0 12px; }
    .login { max-width: 420px; margin: 12vh auto; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 24px; }
    .grid { display: grid; gap: 14px; }
    .columns { display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
    .hero { display: grid; grid-template-columns: minmax(0, 1fr) 220px; gap: 16px; align-items: center; }
    .balance { font-size: 42px; font-weight: 720; line-height: 1; }
    .muted { color: var(--muted); }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    input { width: 100%; min-height: 38px; border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; }
    button { min-height: 38px; border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 6px; padding: 0 12px; cursor: pointer; }
    button.primary { background: var(--brand); border-color: var(--brand); color: white; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .pager { display: flex; gap: 8px; align-items: center; justify-content: flex-end; margin-top: 10px; color: var(--muted); font-size: 13px; }
    .topups { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .topup { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fbfcfd; }
    .price { font-weight: 700; margin: 8px 0 4px; }
    .hero-side { min-height: 76px; display: grid; align-items: center; }
    .spark { width: 100%; height: 64px; border: 1px solid var(--line); border-radius: 6px; background: #fbfcfd; }
    .install-progress { display: grid; gap: 9px; min-height: 64px; align-content: center; }
    .install-progress-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 13px; }
    .install-progress-percent { color: var(--brand); font-weight: 700; }
    .install-progress-bar { height: 8px; overflow: hidden; border-radius: 999px; background: #e8eef3; }
    .install-progress-bar span { display: block; width: 0%; height: 100%; border-radius: inherit; background: var(--brand); transition: width .35s ease; }
    .install-progress.err .install-progress-percent { color: var(--danger); }
    .install-progress.err .install-progress-bar span { background: var(--danger); }
    .usage-total { display: grid; gap: 6px; min-width: 140px; }
    .usage-bar { display: grid; grid-template-columns: var(--input, 1fr) var(--cached, 0fr) var(--output, 1fr); height: 8px; overflow: hidden; border-radius: 999px; background: #eef2f6; }
    .usage-bar span:nth-child(1) { background: #0f6b5d; }
    .usage-bar span:nth-child(2) { background: #7a5af8; }
    .usage-bar span:nth-child(3) { background: #d97706; }
    .status { display: inline-flex; min-height: 24px; align-items: center; border-radius: 999px; padding: 0 8px; background: var(--soft); color: var(--brand); }
    table { width: 100%; border-collapse: collapse; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; overflow: hidden; }
    th, td { padding: 9px 10px; text-align: left; border-bottom: 1px solid var(--line); font-size: 13px; word-break: break-word; }
    th { color: var(--muted); background: #fbfcfd; }
    tr:last-child td { border-bottom: none; }
    .msg { min-height: 22px; color: var(--muted); }
    .err { color: var(--danger); }
    .hidden { display: none !important; }
    @media (max-width: 880px) {
      .columns, .hero { grid-template-columns: 1fr; }
      .shell { padding: 16px; }
      .balance { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div id="login" class="login grid">
    <h1>Codex+++</h1>
    <label>账号<input id="account" autocomplete="username"></label>
    <label>密码<input id="password" type="password" autocomplete="current-password"></label>
    <button id="loginBtn" class="primary">登录</button>
    <p id="loginMsg" class="msg"></p>
  </div>

  <div id="app" class="shell hidden">
    <header>
      <h1>Codex+++</h1>
      <div class="toolbar">
        <button id="simpleBtn" class="primary">简洁模式</button>
        <button id="advancedBtn">高级模式</button>
        <button id="logoutBtn">退出</button>
      </div>
    </header>

    <div id="simple" class="grid">
      <div class="panel hero">
        <div>
          <div class="muted">剩余 token</div>
          <div id="balance" class="balance">0</div>
          <p>账号 <span id="userAccount" class="status"></span> 最近充值 <span id="recentRecharge" class="status"></span></p>
          <div class="toolbar">
            <button id="launchBtn" class="primary">启动 Codex</button>
          </div>
          <p id="launchMsg" class="msg"></p>
        </div>
        <div class="hero-side">
          <canvas id="spark" class="spark" width="220" height="64"></canvas>
          <div id="installProgress" class="install-progress hidden" aria-live="polite">
            <div class="install-progress-head">
              <span id="installProgressText">准备安装 Codex</span>
              <span id="installProgressPercent" class="install-progress-percent">0%</span>
            </div>
            <div class="install-progress-bar"><span id="installProgressFill"></span></div>
          </div>
        </div>
      </div>
      <div class="columns">
        <div class="panel">
          <h2>Token 充值项</h2>
          <div id="topups" class="topups"></div>
          <p id="topupMsg" class="msg"></p>
        </div>
        <div class="panel">
          <h2>服务状态</h2>
          <p>Codex+++ 服务 <span id="serviceState" class="status">可用</span></p>
          <p>Codex 状态 <span id="startState" class="status">未启动</span></p>
          <p>Codex 账号 <span id="currentAccount" class="status"></span></p>
        </div>
      </div>
    </div>

    <div id="advanced" class="grid hidden">
      <div class="panel">
        <h2>账户概览</h2>
        <table id="accountOverviewTable"></table>
      </div>
      <div class="panel">
        <h2>token 收入和消耗</h2>
        <canvas id="ledgerChart" class="spark" width="720" height="72"></canvas>
        <table id="ledgerTable"></table>
        <div id="ledgerPager" class="pager"></div>
      </div>
      <div class="panel">
        <h2>token 用量明细</h2>
        <table id="usageTable"></table>
        <div id="usagePager" class="pager"></div>
      </div>
      <div class="panel">
        <h2>历史充值请求</h2>
        <table id="rechargeTable"></table>
        <div id="rechargePager" class="pager"></div>
      </div>
      <div class="panel">
        <h2>设备与安全状态</h2>
        <table id="securityTable"></table>
      </div>
      <div class="panel">
        <h2>客户端更新</h2>
        <div class="toolbar">
          <button id="checkUpdateBtn">检查更新</button>
          <button id="openUpdateBtn" class="primary" disabled>获取更新</button>
        </div>
        <table id="updateTable"></table>
        <p id="updateMsg" class="msg"></p>
      </div>
      <div class="panel">
        <h2>脱敏诊断</h2>
        <table id="diagnosticsTable"></table>
      </div>
    </div>
  </div>

  <script>
    const INTEROP_MAJOR = '1';
    const state = {
      api: 'http://localhost:8787/api',
      token: localStorage.getItem('clientToken') || '',
      user: null,
      device: null,
      security: null,
      diagnostics: { codexDetected: '不可用', codexRunning: '不可用', codexAccount: '', codexAuthMode: '', configWritten: '不可用', lastFailure: '' },
      currentVersion: '0.1.40',
      updateInfo: null,
      usagePage: 1,
      ledgerPage: 1,
      rechargePage: 1,
      balanceRefreshTimer: null,
      diagnosticsRefreshTimer: null,
      diagnosticsRefreshPending: false,
      codexLaunchPhase: '',
      installProgressTimer: null,
      installProgressPercent: 0
    };
    const $ = (id) => document.getElementById(id);
    localStorage.removeItem('apiBase');

    async function request(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', 'X-CodexPPP-Interop-Major': INTEROP_MAJOR, ...(opts.headers || {}) };
      if (state.token) headers.Authorization = `Bearer ${state.token}`;
      let res;
      try {
        res = await fetch(state.api + path, { ...opts, headers });
      } catch {
        throw new Error('network_unavailable');
      }
      let data = {};
      try {
        const text = await res.text();
        data = text ? JSON.parse(text) : {};
      } catch {
        throw new Error('request_failed');
      }
      if (!res.ok) throw new Error(data.error || res.statusText);
      return data;
    }
    function tauriInvoke() {
      return window.__TAURI__?.core?.invoke || window.__TAURI__?.invoke || null;
    }
    async function invokeTauri(command, args = {}) {
      const invoke = tauriInvoke();
      if (!invoke) return null;
      return invoke(command, args);
    }
    async function configureApiBase() {
      const base = await invokeTauri('backend_api_base');
      if (base) state.api = String(base).replace(/\/+$/, '');
    }
    async function ensureDesktopVersion() {
      const version = await invokeTauri('desktop_version');
      if (version) state.currentVersion = String(version);
    }
    const fmt = (v) => v ? new Date(v).toLocaleString() : '';
    const money = (cents) => cents === 0 ? 'free' : '¥' + (Number(cents || 0) / 100).toFixed(2);
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (ch) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    })[ch]);
    const cell = (v) => esc(v);

    async function deviceIdentity() {
      const native = await invokeTauri('device_identity');
      if (native && native.fingerprint) return native;
      throw new Error('desktop_client_required');
    }

    async function login() {
      await configureApiBase();
      const identity = await deviceIdentity();
      const body = {
        account: $('account').value,
        password: $('password').value,
        deviceName: identity.deviceName || 'Windows 设备',
        fingerprint: identity.fingerprint
      };
      try {
        const data = await request('/client/login', { method: 'POST', body: JSON.stringify(body) });
        state.token = data.token;
        state.user = data.user;
        localStorage.setItem('clientToken', state.token);
        $('login').classList.add('hidden');
        $('app').classList.remove('hidden');
        await refresh();
        startBalanceAutoRefresh();
        startDiagnosticsAutoRefresh();
      } catch (err) {
        $('loginMsg').textContent = userMessage(err.message, '登录失败，请重新输入后再试');
        $('loginMsg').className = 'msg err';
      }
    }

    async function refresh() {
      const me = await request('/client/me');
      applyClientMe(me);
      const local = await invokeTauri('codex_diagnostics');
      applyLocalDiagnostics(local);
      await loadTopups();
      if (!$('advanced').classList.contains('hidden')) await loadAdvanced();
    }

    function applyClientMe(me) {
      state.user = me.user;
      state.device = me.device || null;
      state.security = me.security || null;
      $('balance').textContent = me.user.tokenBalance;
      $('userAccount').textContent = me.user.account;
      $('recentRecharge').textContent = me.user.recentRechargeStatus || '无';
      $('serviceState').textContent = me.service?.status || '不可用';
      if (!$('advanced').classList.contains('hidden')) renderAccountOverviewTable();
      if (me.usage7d) drawSpark($('spark'), me.usage7d.map(x => Number(x.tokens || 0)), '#0f6b5d');
    }

    function applyLocalDiagnostics(local) {
      if (!local) return;
      state.diagnostics = { ...state.diagnostics, ...local };
      $('currentAccount').textContent = state.diagnostics.codexAccount || '未识别';
      if (local.codexRunning === '可用') state.codexLaunchPhase = '';
      renderCodexLaunchState();
    }

    function codexStatusText() {
      if (state.codexLaunchPhase === 'installing') return '正在安装';
      if (state.codexLaunchPhase === 'starting') return '正在启动';
      if (state.diagnostics.codexRunning === '可用') return '运行中';
      if (state.diagnostics.codexDetected !== '可用') return '未检测到';
      return '未启动';
    }

    function renderCodexLaunchState() {
      const status = codexStatusText();
      $('startState').textContent = status;
      if (status === '运行中') {
        $('launchBtn').textContent = '停止 Codex';
        $('launchBtn').disabled = false;
      } else if (status === '正在安装') {
        $('launchBtn').textContent = '正在安装';
        $('launchBtn').disabled = true;
      } else if (status === '正在启动') {
        $('launchBtn').textContent = '正在启动';
        $('launchBtn').disabled = true;
      } else if (status === '未检测到') {
        $('launchBtn').textContent = '安装 Codex';
        $('launchBtn').disabled = false;
      } else {
        $('launchBtn').textContent = '启动 Codex';
        $('launchBtn').disabled = false;
      }
    }

    function setInstallProgress(percent, text) {
      state.installProgressPercent = Math.max(state.installProgressPercent, Math.min(100, Math.round(percent)));
      $('installProgressText').textContent = text;
      $('installProgressPercent').textContent = `${state.installProgressPercent}%`;
      $('installProgressFill').style.width = `${state.installProgressPercent}%`;
    }

    function showInstallProgress() {
      $('spark').classList.add('hidden');
      $('installProgress').classList.remove('hidden', 'err');
      state.installProgressPercent = 0;
      setInstallProgress(8, '准备安装 Codex');
    }

    function startInstallProgress() {
      showInstallProgress();
      clearInterval(state.installProgressTimer);
      state.installProgressTimer = setInterval(() => {
        const current = state.installProgressPercent;
        const next = current < 38 ? current + 6 : current < 72 ? current + 3 : Math.min(92, current + 1);
        const text = next < 38 ? '正在准备安装环境' : next < 72 ? '正在安装 Codex' : '正在确认安装结果';
        setInstallProgress(next, text);
      }, 900);
    }

    function finishInstallProgress(ok) {
      clearInterval(state.installProgressTimer);
      state.installProgressTimer = null;
      if (ok) {
        setInstallProgress(100, 'Codex 已安装');
        setTimeout(() => {
          $('installProgress').classList.add('hidden');
          $('spark').classList.remove('hidden');
          state.installProgressPercent = 0;
          $('installProgressFill').style.width = '0%';
        }, 1200);
        return;
      }
      $('installProgress').classList.add('err');
      setInstallProgress(Math.max(48, state.installProgressPercent), 'Codex 安装失败');
    }

    async function refreshLocalDiagnostics() {
      if (!state.token || document.hidden || $('app').classList.contains('hidden')) return;
      if (state.diagnosticsRefreshPending) return;
      state.diagnosticsRefreshPending = true;
      try {
        const local = await invokeTauri('codex_diagnostics');
        applyLocalDiagnostics(local);
      } catch (err) {
      } finally {
        state.diagnosticsRefreshPending = false;
      }
    }

    async function silentRefreshBalance() {
      if (!state.token || document.hidden || $('app').classList.contains('hidden')) return;
      try {
        const me = await request('/client/me');
        applyClientMe(me);
      } catch (err) {
      }
    }

    function startBalanceAutoRefresh() {
      if (state.balanceRefreshTimer) return;
      state.balanceRefreshTimer = setInterval(silentRefreshBalance, 30000);
    }

    function startDiagnosticsAutoRefresh() {
      if (state.diagnosticsRefreshTimer) return;
      state.diagnosticsRefreshTimer = setInterval(refreshLocalDiagnostics, 6000);
    }

    async function loadTopups() {
      const data = await request('/client/topups');
      $('topups').innerHTML = data.items.map(topup => `
        <div class="topup">
          <strong>${esc(topup.name)}</strong>
          <div class="price">${esc(money(topup.priceCents))}</div>
          <div class="muted">${esc(topup.tokens)} token</div>
          ${topup.priceCents > 0 ? `<button data-topup="${esc(topup.id)}" class="primary">申请充值</button>` : ''}
        </div>`).join('');
      document.querySelectorAll('[data-topup]').forEach(btn => btn.onclick = async () => {
        try {
          await request('/client/recharges', { method: 'POST', body: JSON.stringify({ topupId: btn.dataset.topup }) });
          $('topupMsg').textContent = '等待管理员确认';
          await refresh();
        } catch (err) {
          $('topupMsg').textContent = userMessage(err.message, '申请失败，请刷新后重试');
        }
      });
    }

    async function launchCodex() {
      state.codexLaunchPhase = 'starting';
      let launchStep = 'diagnostics';
      renderCodexLaunchState();
      $('launchMsg').textContent = '';
      $('launchMsg').className = 'msg';
      try {
        if (!tauriInvoke()) throw new Error('desktop_shell_required');
        const before = await invokeTauri('codex_diagnostics');
        applyLocalDiagnostics(before);
        if (state.diagnostics.codexRunning === '可用') return;
        state.codexLaunchPhase = 'starting';
        renderCodexLaunchState();
        launchStep = 'service';
        const me = await request('/client/me');
        applyClientMe(me);
        let providerToken = '';
        if (state.diagnostics.codexAuthMode !== 'chatgpt') {
          launchStep = 'backend_prepare';
          const prep = await request('/client/launch/prepare', { method: 'POST', body: '{}' });
          providerToken = prep.provider && prep.provider.bearerToken;
          if (!providerToken) throw new Error('codex_provider_unavailable');
        }
        launchStep = 'local_prepare';
        const localPrep = await invokeTauri('prepare_codex', { backendUrl: state.api, providerToken });
        applyLocalDiagnostics(localPrep);
        if (state.diagnostics.codexRunning === '可用') return;
        state.codexLaunchPhase = 'starting';
        renderCodexLaunchState();
        launchStep = 'local_launch';
        const launch = await invokeTauri('launch_codex');
        $('startState').textContent = launch ? launch.launchState : '已启动';
        launchStep = 'wait_running';
        await waitForCodexRunning();
      } catch (err) {
        state.codexLaunchPhase = '';
        try {
          const local = await invokeTauri('codex_diagnostics');
          applyLocalDiagnostics(local);
          if (state.diagnostics.codexRunning === '可用') {
            $('launchMsg').textContent = '';
            $('launchMsg').className = 'msg';
            return;
          }
        } catch (diagnosticErr) {
        }
        const failure = launchFailureMessage(err.message, launchStep);
        $('startState').textContent = '启动失败';
        $('launchMsg').textContent = failure;
        $('launchMsg').className = 'msg err';
        state.diagnostics.lastFailure = failure;
      }
      if (!$('advanced').classList.contains('hidden')) loadAdvanced();
    }

    async function waitForCodexRunning() {
      for (let i = 0; i < 20; i += 1) {
        await new Promise(resolve => setTimeout(resolve, 750));
        const local = await invokeTauri('codex_diagnostics');
        applyLocalDiagnostics(local);
        if (state.diagnostics.codexRunning === '可用') return;
        state.codexLaunchPhase = 'starting';
        renderCodexLaunchState();
      }
      state.codexLaunchPhase = '';
      $('startState').textContent = '已发起启动';
      $('launchBtn').textContent = '启动 Codex';
      $('launchBtn').disabled = false;
    }

    async function stopCodex() {
      $('launchMsg').textContent = '';
      $('launchMsg').className = 'msg';
      try {
        if (!tauriInvoke()) throw new Error('desktop_shell_required');
        $('launchBtn').textContent = '正在停止';
        $('launchBtn').disabled = true;
        const stopped = await invokeTauri('stop_codex');
        applyLocalDiagnostics(stopped);
        await refreshLocalDiagnostics();
      } catch (err) {
        $('launchMsg').textContent = userMessage(err.message, '停止失败，请稍后重试');
        $('launchMsg').className = 'msg err';
      } finally {
        renderCodexLaunchState();
      }
      if (!$('advanced').classList.contains('hidden')) loadAdvanced();
    }

    async function installCodex() {
      $('launchMsg').textContent = '';
      $('launchMsg').className = 'msg';
      state.codexLaunchPhase = 'installing';
      startInstallProgress();
      renderCodexLaunchState();
      let installOk = false;
      try {
        if (!tauriInvoke()) throw new Error('desktop_shell_required');
        $('launchBtn').textContent = '正在安装';
        $('launchBtn').disabled = true;
        const installed = await invokeTauri('install_codex');
        if (installed === null) throw new Error('codex_install_unavailable');
        setInstallProgress(94, '正在确认安装结果');
        applyLocalDiagnostics(installed);
        await refreshLocalDiagnostics();
        $('launchMsg').textContent = 'Codex 已安装';
        $('launchMsg').className = 'msg';
        installOk = true;
      } catch (err) {
        $('launchMsg').textContent = userMessage(err.message, 'Codex 安装失败，请联系管理员');
        $('launchMsg').className = 'msg err';
      } finally {
        state.codexLaunchPhase = '';
        finishInstallProgress(installOk);
        renderCodexLaunchState();
      }
    }

    async function launchButtonAction() {
      const status = codexStatusText();
      if (status === '运行中') return stopCodex();
      if (status === '未检测到') return installCodex();
      return launchCodex();
    }

    function userMessage(code, fallback) {
      const messages = {
        topup_unavailable: 'Token 充值项不可用，请刷新后重试',
        topup_not_available: 'Token 充值项不可用，请刷新后重试',
        free_topup_view_only: 'free Token 充值项仅供查看，请选择其他 Token 充值项',
        invalid_recharge_request: '申请失败，请刷新后重试',
        invalid_json: '请求失败，请稍后重试',
        request_failed: '请求失败，请稍后重试',
        network_unavailable: '网络不可用，请稍后重试',
        client_version_incompatible: '客户端版本不兼容，请更新客户端',
        login_failed: '登录失败',
        invalid_client_login_request: '登录失败',
        desktop_client_required: '请使用 Windows 客户端登录',
        route_unavailable: '服务暂时不可用，请稍后再试',
        desktop_shell_required: '请使用 Windows 客户端启动 Codex',
        codex_not_detected: '未检测到本机 Codex，请确认已安装后重试',
        codex_launch_failed: '本机 Codex 主程序启动失败，请确认 Codex 可从开始菜单正常打开',
        codex_appid_launch_failed: '本机 Codex 启动失败，请确认 Codex 可从开始菜单正常打开',
        codex_command_launch_failed: '本机 Codex 命令启动失败，请联系管理员',
        codex_auth_write_failed: 'Codex 自动登录失败，请联系管理员',
        codex_stop_failed: 'Codex 停止失败，请稍后重试',
        codex_install_unavailable: 'Codex 安装失败，请联系管理员',
        codex_install_component_missing: 'Codex 安装失败，请联系管理员',
        codex_install_failed: 'Codex 安装失败，请联系管理员',
        update_download_unavailable: '请使用 Windows 客户端获取更新',
        update_download_failed: '获取更新失败，请稍后重试'
      };
      return messages[code] || fallback;
    }
    function launchFailureMessage(code, step = '') {
      if (!code) return '启动失败，请稍后重试';
      const mapped = userMessage(code, '');
      if (mapped) return mapped;
      if (step === 'service' || step === 'backend_prepare') return 'Codex+++ 服务暂时不可用，请稍后再试';
      if (step === 'local_launch') return '本机 Codex 主程序启动失败，请确认 Codex 可从开始菜单正常打开';
      if (String(code).includes('未检测到本机 Codex')) return '未检测到本机 Codex，请确认已安装后重试';
      return '启动失败，请稍后重试';
    }

    async function loadAdvanced() {
      const [usage, ledger, ledgerRows, recharges] = await Promise.all([
        request(`/client/usage?page=${state.usagePage}&size=10`),
        request('/client/ledger/summary?days=30'),
        request(`/client/ledger?page=${state.ledgerPage}&size=10`),
        request(`/client/recharges?page=${state.rechargePage}&size=10`)
      ]);
      const me = await request('/client/me');
      state.user = me.user;
      state.device = me.device || state.device;
      state.security = me.security || state.security;
      drawLedger(ledger.items);
      renderAccountOverviewTable();
      $('ledgerTable').innerHTML = table(['时间', '类型', 'token 变动', '变动后余额', '来源'], ledgerRows.items.map(x => [fmt(x.createdAt), x.typeLabel || x.type, x.deltaTokens, x.balanceAfter, x.source]));
      $('ledgerPager').innerHTML = pager(ledgerRows, 'ledger');
      $('usageTable').innerHTML = usageDetailTable(usage.items);
      $('usagePager').innerHTML = pager(usage, 'usage');
      $('rechargeTable').innerHTML = table(['Token 充值项', '状态', '提交时间', '确认时间'], recharges.items.map(x => [x.topupName, x.statusLabel || x.status, fmt(x.submittedAt), fmt(x.confirmedAt)]));
      $('rechargePager').innerHTML = pager(recharges, 'recharge');
      $('securityTable').innerHTML = table(['项目', '状态'], [
        ['设备状态', state.device?.status || ''],
        ['账号状态', state.security?.accountStatus || ''],
        ['登录状态', state.security?.sessionStatus || '']
      ]);
      await ensureDesktopVersion();
      renderUpdateInfo();
      $('diagnosticsTable').innerHTML = table(['项目', '状态'], [
        ['本机 Codex 是否检测到', state.diagnostics.codexDetected],
        ['本机 Codex 是否正在运行', state.diagnostics.codexRunning],
        ['最近一次启动失败原因', state.diagnostics.lastFailure || '']
      ]);
      $('checkUpdateBtn').onclick = checkUpdate;
      $('openUpdateBtn').onclick = openUpdateDownload;
      bindPager('usage', (page) => { state.usagePage = page; loadAdvanced(); });
      bindPager('ledger', (page) => { state.ledgerPage = page; loadAdvanced(); });
      bindPager('recharge', (page) => { state.rechargePage = page; loadAdvanced(); });
    }

    async function checkUpdate() {
      const btn = $('checkUpdateBtn');
      btn.disabled = true;
      try {
        await ensureDesktopVersion();
        state.updateInfo = await request(`/client/desktop/update?currentVersion=${encodeURIComponent(state.currentVersion)}`);
        renderUpdateInfo();
      } catch (err) {
        $('updateMsg').textContent = userMessage(err.message, '检查更新失败，请稍后重试');
        $('updateMsg').className = 'msg err';
      } finally {
        btn.disabled = false;
      }
    }

    function renderUpdateInfo() {
      const info = state.updateInfo || { currentVersion: state.currentVersion, latestVersion: state.currentVersion, available: false, releaseNotes: '', sha256: '' };
      const rows = [
        ['当前版本', info.currentVersion || state.currentVersion],
        ['最新版本', info.latestVersion || state.currentVersion],
        ['更新状态', info.available ? '可用' : '不可用']
      ];
      if (info.releaseNotes) rows.push(['更新说明', info.releaseNotes]);
      if (info.sha256) rows.push(['校验值', info.sha256]);
      $('updateTable').innerHTML = table(['项目', '状态'], rows);
      $('openUpdateBtn').disabled = !(info.available && info.downloadUrl);
      $('updateMsg').className = 'msg';
      $('updateMsg').textContent = info.available ? (info.downloadUrl ? '发现新版本' : '发现新版本，请联系管理员获取更新') : '当前已是最新版本';
    }

    async function openUpdateDownload() {
      const info = state.updateInfo || {};
      if (!(info.available && info.downloadUrl)) {
        $('updateMsg').textContent = '当前没有可获取的更新';
        return;
      }
      try {
        const opened = await invokeTauri('open_update_download', { downloadUrl: info.downloadUrl });
        if (opened === null) throw new Error('update_download_unavailable');
        $('updateMsg').textContent = '已打开更新下载';
        $('updateMsg').className = 'msg';
      } catch (err) {
        $('updateMsg').textContent = userMessage(err.message, '获取更新失败，请稍后重试');
        $('updateMsg').className = 'msg err';
      }
    }

    function table(headers, rows) {
      return `<thead><tr>${headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${cell(c)}</td>`).join('')}</tr>`).join('')}</tbody>`;
    }
    function renderAccountOverviewTable() {
      if (!$('accountOverviewTable') || !state.user) return;
      $('accountOverviewTable').innerHTML = table(['项目', '状态'], [
        ['账号', state.user.account || ''],
        ['剩余 token', state.user.tokenBalance ?? 0],
        ['最近充值', state.user.recentRechargeStatus || '无']
      ]);
    }
    function usageDetailTable(items) {
      const headers = ['时间', '模型', 'input token', 'cached input token', 'output token', '总 token'];
      return `<thead><tr>${headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${items.map(x => `<tr>
        <td>${esc(fmt(x.createdAt))}</td>
        <td>${esc(x.model)}</td>
        <td>${esc(x.inputTokens)}</td>
        <td>${esc(x.cachedInputTokens)}</td>
        <td>${esc(x.outputTokens)}</td>
        <td>${usageTotalCell(x)}</td>
      </tr>`).join('')}</tbody>`;
    }
    function usageTotalCell(x) {
      const input = Math.max(0, Number(x.inputTokens || 0));
      const cached = Math.max(0, Number(x.cachedInputTokens || 0));
      const output = Math.max(0, Number(x.outputTokens || 0));
      const total = Math.max(1, Number(x.totalTokens || input + cached + output || 1));
      const style = `--input:${input / total}fr;--cached:${cached / total}fr;--output:${output / total}fr`;
      return `<div class="usage-total"><span>${esc(x.totalTokens)}</span><div class="usage-bar" style="${esc(style)}"><span></span><span></span><span></span></div></div>`;
    }
    function pager(data, key) {
      const page = Number(data.page || 1);
      const totalPages = Number(data.totalPages || 0);
      return `<button data-page="${esc(key)}" data-value="${page - 1}" ${page <= 1 ? 'disabled' : ''}>上一页</button><span>${esc(page)} / ${esc(Math.max(1, totalPages))}，共 ${esc(Number(data.total || 0))} 条</span><button data-page="${esc(key)}" data-value="${page + 1}" ${totalPages === 0 || page >= totalPages ? 'disabled' : ''}>下一页</button>`;
    }
    function bindPager(key, onPage) {
      document.querySelectorAll(`[data-page="${key}"]`).forEach(btn => btn.onclick = () => {
        const page = Number(btn.dataset.value || 1);
        if (page > 0) onPage(page);
      });
    }
    function drawSpark(canvas, values, color) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      const points = (values || []).map((v) => Number(v || 0)).filter(Number.isFinite);
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = '#d7dde5';
      ctx.beginPath(); ctx.moveTo(0, h - 10); ctx.lineTo(w, h - 10); ctx.stroke();
      const max = Math.max(1, ...points);
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
      points.forEach((v, i) => {
        const x = points.length === 1 ? w : i * (w / (points.length - 1));
        const y = h - 10 - (v / max) * (h - 20);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }
    function drawLedger(items) {
      const canvas = $('ledgerChart');
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const max = Math.max(1, ...items.map(x => Math.max(Number(x.incomeTokens || 0), Number(x.expenseTokens || 0))));
      const barW = Math.max(4, w / Math.max(1, items.length) - 3);
      const mid = h / 2;
      ctx.strokeStyle = '#d7dde5'; ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(w, mid); ctx.stroke();
      items.forEach((x, i) => {
        const income = Number(x.incomeTokens || 0) / max * (mid - 8);
        const expense = Number(x.expenseTokens || 0) / max * (mid - 8);
        const left = i * (barW + 3);
        ctx.fillStyle = '#12b76a';
        ctx.fillRect(left, mid - income, barW, income);
        ctx.fillStyle = '#f04438';
        ctx.fillRect(left, mid, barW, expense);
      });
    }

    $('loginBtn').onclick = login;
    $('logoutBtn').onclick = () => { localStorage.removeItem('clientToken'); location.reload(); };
    $('launchBtn').onclick = launchButtonAction;
    $('simpleBtn').onclick = () => { $('simple').classList.remove('hidden'); $('advanced').classList.add('hidden'); $('simpleBtn').classList.add('primary'); $('advancedBtn').classList.remove('primary'); };
    $('advancedBtn').onclick = async () => { $('simple').classList.add('hidden'); $('advanced').classList.remove('hidden'); $('simpleBtn').classList.remove('primary'); $('advancedBtn').classList.add('primary'); await loadAdvanced(); };
    window.addEventListener('focus', () => { silentRefreshBalance(); refreshLocalDiagnostics(); });
    document.addEventListener('visibilitychange', () => { if (!document.hidden) { silentRefreshBalance(); refreshLocalDiagnostics(); } });
    async function boot() {
      await configureApiBase();
      if (state.token) {
        $('login').classList.add('hidden');
        $('app').classList.remove('hidden');
        refresh().then(() => { startBalanceAutoRefresh(); startDiagnosticsAutoRefresh(); }).catch(() => { localStorage.removeItem('clientToken'); location.reload(); });
      }
    }
    boot();
  </script>
</body>
</html>
