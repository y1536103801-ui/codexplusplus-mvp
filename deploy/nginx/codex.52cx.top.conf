server {
    server_name codex.52cx.top;

    # Ordinary management APIs stay small. The Codex responses route below is
    # streamed to the backend, which enforces the decoded safety limit itself.
    client_max_body_size 1m;

    location ^~ /downloads/ {
        alias /var/www/codexppp-downloads/;
        autoindex off;
        default_type application/octet-stream;
        add_header Content-Disposition 'attachment' always;
        add_header X-Content-Type-Options 'nosniff' always;
    }

    location = /api/codex/v1/responses {
        client_max_body_size 0;
        client_body_timeout 600s;

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Codex responses may use server-sent events and long-running requests.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/codex.52cx.top/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/codex.52cx.top/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = codex.52cx.top) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name codex.52cx.top;
    return 404; # managed by Certbot
}
