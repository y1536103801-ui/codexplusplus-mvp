services:
  caddy:
    image: caddy:2
    container_name: codex-plus-caddy
    restart: unless-stopped
    depends_on:
      - backend
      - admin
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./.env.production
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - codex_plus

  backend:
    image: ${SUB2API_BACKEND_IMAGE}
    container_name: codex-plus-backend
    restart: unless-stopped
    env_file:
      - ./.env.production
    expose:
      - "${BACKEND_INTERNAL_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codex_plus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${BACKEND_INTERNAL_PORT:-3000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  admin:
    image: ${SUB2API_ADMIN_IMAGE}
    container_name: codex-plus-admin
    restart: unless-stopped
    env_file:
      - ./.env.production
    expose:
      - "${ADMIN_INTERNAL_PORT:-80}"
    networks:
      - codex_plus

  postgres:
    image: postgres:16-alpine
    container_name: codex-plus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codex_plus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codex-plus-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - codex_plus
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  codex_plus:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
