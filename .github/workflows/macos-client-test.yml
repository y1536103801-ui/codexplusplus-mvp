name: macOS client test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/macos-client-test.yml"
      - "desktop-client/**"
      - "scripts/build-macos-client.sh"

permissions:
  contents: read

jobs:
  build-and-test:
    name: macOS 14 Apple Silicon
    runs-on: macos-14
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify Apple-hosted test environment
        run: |
          test "$(uname -s)" = "Darwin"
          test "$(uname -m)" = "arm64"
          test "$(sw_vers -productVersion | cut -d. -f1)" -ge 14

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Run tests and build ad-hoc test package
        run: sh scripts/build-macos-client.sh

      - name: Verify app bundle
        run: |
          app="desktop-client/src-tauri/target/release/bundle/macos/Codex+++.app"
          test -x "$app/Contents/MacOS/codexppp-desktop"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app/Contents/Info.plist")" = "com.codexppp.desktop"
          /usr/bin/codesign --verify --deep --strict "$app"

      - name: Upload test package
        uses: actions/upload-artifact@v4
        with:
          name: codexppp-macos-adhoc-test
          if-no-files-found: error
          retention-days: 7
          path: |
            desktop-client/src-tauri/target/release/bundle/macos/Codex+++.app
            desktop-client/src-tauri/target/release/bundle/dmg/*.dmg
